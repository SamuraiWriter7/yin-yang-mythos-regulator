schema_version: "0.5.0"
orchestration_id: "multi-wing-defensive-orchestration-v0-5"
created_at: "2026-06-29T00:00:00Z"

purpose: "Coordinate defensive AI regulation across multiple specialized wings so that no single wing can complete the loop alone."

source_records:
  - record_type: "mythos_regulation_record"
    record_id: "mythos-reg-agent-permission-boundary-v0-1"
    schema_version: "0.1.0"
    summary: "Converted over-autonomous agent tendency into defensive repair and boundary preservation."

  - record_type: "defensive_repair_loop"
    record_id: "repair-loop-agent-permission-boundary-v0-2"
    schema_version: "0.2.0"
    summary: "Expanded the regulation record into an observe, analyze, repair, verify, record, and review loop."

  - record_type: "agent_permission_boundary"
    record_id: "agent-boundary-defensive-repair-assistant-v0-3"
    schema_version: "0.3.0"
    summary: "Defined permission boundaries, stop conditions, trace policy, and review gates for a defensive repair assistant."

  - record_type: "trace_receipt_bridge"
    record_id: "trace-bridge-agent-boundary-v0-4"
    schema_version: "0.4.0"
    summary: "Exported internal defensive regulation records into an external trace receipt bridge."

orchestration_policy:
no_single_wing_completion: true
human_review_required: true
trace_required: true
execution_requires_human_gate: true
least_privilege_required: true
external_export_requires_review: true
unsafe_detail_expansion_allowed: "not_allowed"
principle: "No wing may complete the loop alone."

wings:
  - wing_id: "finder-wing"
    wing_type: "finder"
    role: "abstract_risk_finding"
    responsibility: "Identify abstract defensive risk candidates without producing exploit steps, attack instructions, or operational misuse detail."
    input_from: []
    output_to:
      - "analyst-wing"
    allowed_outputs:
      - "risk_candidates"
      - "handoff_record"
    prohibited_outputs:
      - "exploit_execution_steps"
      - "unauthorized_intrusion_guidance"
      - "malicious_code"
      - "credential_theft"
      - "persistence_or_evasion"
      - "harmful_payloads"
      - "real_target_attack_instructions"
      - "sensitive_secret_values"
      - "unreviewed_deployment_instruction"
      - "self_permission_expansion"
      - "review_gate_bypass"
      - "trace_suppression"
    execution_allowed: false
    review_required: true
    trace_required: true
    notes: "Finder Wing observes only abstract defensive risks."

  - wing_id: "analyst-wing"
    wing_type: "analyst"
    role: "boundary_and_impact_analysis"
    responsibility: "Analyze premises, boundaries, impact, and affected review gates from the abstract risk candidates."
    input_from:
      - "finder-wing"
    output_to:
      - "repair-wing"
    allowed_outputs:
      - "defensive_analysis"
      - "residual_risk_summary"
      - "handoff_record"
    prohibited_outputs:
      - "exploit_execution_steps"
      - "unauthorized_intrusion_guidance"
      - "malicious_code"
      - "credential_theft"
      - "persistence_or_evasion"
      - "harmful_payloads"
      - "real_target_attack_instructions"
      - "sensitive_secret_values"
      - "unreviewed_deployment_instruction"
      - "self_permission_expansion"
      - "review_gate_bypass"
      - "trace_suppression"
    execution_allowed: false
    review_required: true
    trace_required: true
    notes: "Analyst Wing converts risks into defensive impact analysis."

  - wing_id: "repair-wing"
    wing_type: "repair"
    role: "defensive_repair_generation"
    responsibility: "Generate repair-first recommendations such as least-privilege scopes, stop conditions, logging requirements, and review gates."
    input_from:
      - "analyst-wing"
    output_to:
      - "verifier-wing"
    allowed_outputs:
      - "repair_plan"
      - "residual_risk_summary"
      - "handoff_record"
    prohibited_outputs:
      - "exploit_execution_steps"
      - "unauthorized_intrusion_guidance"
      - "malicious_code"
      - "credential_theft"
      - "persistence_or_evasion"
      - "harmful_payloads"
      - "real_target_attack_instructions"
      - "sensitive_secret_values"
      - "unreviewed_deployment_instruction"
      - "self_permission_expansion"
      - "review_gate_bypass"
      - "trace_suppression"
    execution_allowed: false
    review_required: true
    trace_required: true
    notes: "Repair Wing proposes defensive changes only."

  - wing_id: "verifier-wing"
    wing_type: "verifier"
    role: "repair_verification"
    responsibility: "Define verification checklists for repair outputs without deploying or executing changes."
    input_from:
      - "repair-wing"
    output_to:
      - "boundary-wing"
    allowed_outputs:
      - "verification_checklist"
      - "residual_risk_summary"
      - "handoff_record"
    prohibited_outputs:
      - "exploit_execution_steps"
      - "unauthorized_intrusion_guidance"
      - "malicious_code"
      - "credential_theft"
      - "persistence_or_evasion"
      - "harmful_payloads"
      - "real_target_attack_instructions"
      - "sensitive_secret_values"
      - "unreviewed_deployment_instruction"
      - "self_permission_expansion"
      - "review_gate_bypass"
      - "trace_suppression"
    execution_allowed: false
    review_required: true
    trace_required: true
    notes: "Verifier Wing checks whether repairs are ready for review."

  - wing_id: "boundary-wing"
    wing_type: "boundary"
    role: "permission_boundary_review"
    responsibility: "Review whether the proposed repair respects permission boundaries, stop conditions, allowed environments, and human review gates."
    input_from:
      - "verifier-wing"
    output_to:
      - "bridge-wing"
    allowed_outputs:
      - "boundary_decision"
      - "residual_risk_summary"
      - "handoff_record"
    prohibited_outputs:
      - "exploit_execution_steps"
      - "unauthorized_intrusion_guidance"
      - "malicious_code"
      - "credential_theft"
      - "persistence_or_evasion"
      - "harmful_payloads"
      - "real_target_attack_instructions"
      - "sensitive_secret_values"
      - "unreviewed_deployment_instruction"
      - "self_permission_expansion"
      - "review_gate_bypass"
      - "trace_suppression"
    execution_allowed: false
    review_required: true
    trace_required: true
    notes: "Boundary Wing blocks movement if permission constraints are unclear."

  - wing_id: "bridge-wing"
    wing_type: "bridge"
    role: "trace_receipt_export_preparation"
    responsibility: "Prepare a safe trace receipt bridge for external review without publishing or synchronizing it automatically."
    input_from:
      - "boundary-wing"
    output_to:
      - "human-gate"
    allowed_outputs:
      - "trace_receipt_bridge"
      - "residual_risk_summary"
      - "handoff_record"
    prohibited_outputs:
      - "exploit_execution_steps"
      - "unauthorized_intrusion_guidance"
      - "malicious_code"
      - "credential_theft"
      - "persistence_or_evasion"
      - "harmful_payloads"
      - "real_target_attack_instructions"
      - "sensitive_secret_values"
      - "unreviewed_deployment_instruction"
      - "self_permission_expansion"
      - "review_gate_bypass"
      - "trace_suppression"
    execution_allowed: false
    review_required: true
    trace_required: true
    notes: "Bridge Wing prepares export only; it does not publish."

  - wing_id: "human-gate"
    wing_type: "human_gate"
    role: "human_review"
    responsibility: "Review the orchestration output before completion, export, deployment, publication, or permission expansion."
    input_from:
      - "bridge-wing"
    output_to:
      - "trace-core"
    allowed_outputs:
      - "review_decision"
      - "handoff_record"
    prohibited_outputs:
      - "exploit_execution_steps"
      - "unauthorized_intrusion_guidance"
      - "malicious_code"
      - "credential_theft"
      - "persistence_or_evasion"
      - "harmful_payloads"
      - "real_target_attack_instructions"
      - "sensitive_secret_values"
      - "unreviewed_deployment_instruction"
      - "self_permission_expansion"
      - "review_gate_bypass"
      - "trace_suppression"
    execution_allowed: true
    review_required: true
    trace_required: true
    notes: "Human Gate is the only point where completion can be approved."

  - wing_id: "trace-core"
    wing_type: "trace_core"
    role: "orchestration_trace"
    responsibility: "Record the full orchestration chain, wing outputs, handoffs, review status, residual risks, and final status."
    input_from:
      - "human-gate"
    output_to: []
    allowed_outputs:
      - "orchestration_receipt"
      - "residual_risk_summary"
    prohibited_outputs:
      - "exploit_execution_steps"
      - "unauthorized_intrusion_guidance"
      - "malicious_code"
      - "credential_theft"
      - "persistence_or_evasion"
      - "harmful_payloads"
      - "real_target_attack_instructions"
      - "sensitive_secret_values"
      - "unreviewed_deployment_instruction"
      - "self_permission_expansion"
      - "review_gate_bypass"
      - "trace_suppression"
    execution_allowed: false
    review_required: true
    trace_required: true
    notes: "Trace Core records; it does not execute."

handoff_rules:
  - from_wing: "finder-wing"
    to_wing: "analyst-wing"
    required_inputs: []
    required_outputs:
      - "risk_candidates"
    handoff_condition: "after_trace_recorded"
    trace_required: true
    blocking_if_missing: true

  - from_wing: "analyst-wing"
    to_wing: "repair-wing"
    required_inputs:
      - "risk_candidates"
    required_outputs:
      - "defensive_analysis"
    handoff_condition: "after_trace_recorded"
    trace_required: true
    blocking_if_missing: true

  - from_wing: "repair-wing"
    to_wing: "verifier-wing"
    required_inputs:
      - "defensive_analysis"
    required_outputs:
      - "repair_plan"
    handoff_condition: "after_trace_recorded"
    trace_required: true
    blocking_if_missing: true

  - from_wing: "verifier-wing"
    to_wing: "boundary-wing"
    required_inputs:
      - "repair_plan"
    required_outputs:
      - "verification_checklist"
    handoff_condition: "after_verification_checklist"
    trace_required: true
    blocking_if_missing: true

  - from_wing: "boundary-wing"
    to_wing: "bridge-wing"
    required_inputs:
      - "verification_checklist"
    required_outputs:
      - "boundary_decision"
    handoff_condition: "after_boundary_check"
    trace_required: true
    blocking_if_missing: true

  - from_wing: "bridge-wing"
    to_wing: "human-gate"
    required_inputs:
      - "boundary_decision"
    required_outputs:
      - "trace_receipt_bridge"
    handoff_condition: "after_safe_export_check"
    trace_required: true
    blocking_if_missing: true

  - from_wing: "human-gate"
    to_wing: "trace-core"
    required_inputs:
      - "trace_receipt_bridge"
    required_outputs:
      - "review_decision"
    handoff_condition: "after_human_review"
    trace_required: true
    blocking_if_missing: true

blocking_conditions:
  - condition_id: "block-unsafe-detail"
    trigger: "unsafe_detail_detected"
    required_action: "remove_unsafe_detail"
    reason: "The orchestration must not produce exploit steps, malicious code, credential theft, or operational misuse details."
    blocking: true

  - condition_id: "block-authorization-unclear"
    trigger: "authorization_unclear"
    required_action: "pause"
    reason: "The orchestration must pause when ownership, authorization, or operating scope is unclear."
    blocking: true

  - condition_id: "block-trace-missing"
    trigger: "trace_missing"
    required_action: "record_and_pause"
    reason: "Each wing handoff must be traceable."
    blocking: true

  - condition_id: "block-review-gate-missing"
    trigger: "review_gate_missing"
    required_action: "escalate_to_human_review"
    reason: "Completion, deployment, export, or permission expansion must not occur without a review gate."
    blocking: true

  - condition_id: "block-boundary-failure"
    trigger: "boundary_failure"
    required_action: "return_to_previous_wing"
    reason: "If permission boundaries fail, the orchestration must return to repair or boundary review."
    blocking: true

  - condition_id: "block-single-wing-completion"
    trigger: "single_wing_completion_attempted"
    required_action: "block"
    reason: "No wing may complete the defensive regulation loop alone."
    blocking: true

orchestration_receipt:
  origin_question: "How can defensive AI regulation be coordinated across multiple wings without allowing any single wing to complete the loop alone?"
  orchestration_summary: "A multi-wing defensive orchestration that separates abstract risk finding, analysis, repair, verification, permission boundary review, trace bridge preparation, human review, and final trace recording."

  wing_outputs:
    - wing_id: "finder-wing"
      status: "completed_for_review"
      summary: "Identified abstract defensive risk candidates related to over-autonomy, boundary ambiguity, missing trace, and review gate absence."
      output_refs:
        - "risk_candidates"
      residual_risk: "Risk candidates remain abstract and require analysis."

    - wing_id: "analyst-wing"
      status: "completed_for_review"
      summary: "Analyzed affected boundaries, review gates, and potential impact without expanding into unsafe operational detail."
      output_refs:
        - "defensive_analysis"
      residual_risk: "Impact assessment requires confirmation by a reviewer."

    - wing_id: "repair-wing"
      status: "completed_for_review"
      summary: "Prepared repair-first recommendations including least-privilege tool scope, explicit stop conditions, and mandatory trace receipts."
      output_refs:
        - "repair_plan"
      residual_risk: "Repair plan is not deployment-ready without verification and review."

    - wing_id: "verifier-wing"
      status: "completed_for_review"
      summary: "Prepared a verification checklist for the proposed repair plan."
      output_refs:
        - "verification_checklist"
      residual_risk: "Verification remains checklist-level until environment-specific review."

    - wing_id: "boundary-wing"
      status: "completed_for_review"
      summary: "Confirmed that permission expansion, deployment, external export, and high-impact action require review gates."
      output_refs:
        - "boundary_decision"
      residual_risk: "Boundary decision requires human confirmation before external use."

    - wing_id: "bridge-wing"
      status: "completed_for_review"
      summary: "Prepared a safe trace receipt bridge for external review without publishing or synchronizing automatically."
      output_refs:
        - "trace_receipt_bridge"
      residual_risk: "External export requires human review."

    - wing_id: "human-gate"
      status: "requires_review"
      summary: "Human review is required before completion, external export, deployment, or publication."
      output_refs:
        - "review_decision"
      residual_risk: "No final approval has been granted in this example."

    - wing_id: "trace-core"
      status: "drafted"
      summary: "Recorded orchestration chain, wing outputs, handoffs, blocking conditions, residual risks, and review status."
      output_refs:
        - "orchestration_receipt"
      residual_risk: "Final trace remains review-required."

  handoff_chain:
    - from_wing: "finder-wing"
      to_wing: "analyst-wing"
      status: "completed"
      trace_recorded: true

    - from_wing: "analyst-wing"
      to_wing: "repair-wing"
      status: "completed"
      trace_recorded: true

    - from_wing: "repair-wing"
      to_wing: "verifier-wing"
      status: "completed"
      trace_recorded: true

    - from_wing: "verifier-wing"
      to_wing: "boundary-wing"
      status: "completed"
      trace_recorded: true

    - from_wing: "boundary-wing"
      to_wing: "bridge-wing"
      status: "completed"
      trace_recorded: true

    - from_wing: "bridge-wing"
      to_wing: "human-gate"
      status: "requires_review"
      trace_recorded: true

    - from_wing: "human-gate"
      to_wing: "trace-core"
      status: "requires_review"
      trace_recorded: true

  blocked_conditions:
    - condition_id: "block-unsafe-detail"
      triggered: false
      status: "not_triggered"
      notes: "No unsafe operational detail is included."

    - condition_id: "block-single-wing-completion"
      triggered: false
      status: "not_triggered"
      notes: "The orchestration requires multiple wing handoffs and human review."

    - condition_id: "block-review-gate-missing"
      triggered: false
      status: "not_triggered"
      notes: "Human review gate is present before completion and external export."

  review_decision:
    human_review_required: true
    reviewer_role: "project maintainer or security reviewer"
    decision_status: "review_required"
    notes: "This example is documentation-level and requires review before external export or deployment."

  residual_risks:
    - "The orchestration is documentation-level and not approved for deployment."
    - "External export requires review and may require target-specific receipt mapping."
    - "Environment-specific safety checks are required before any operational use."

  final_status: "review_required"

safety_boundary:
  prohibited_outputs:
    - "exploit_execution_steps"
    - "unauthorized_intrusion_guidance"
    - "malicious_code"
    - "credential_theft"
    - "persistence_or_evasion"
    - "harmful_payloads"
    - "real_target_attack_instructions"
    - "sensitive_secret_values"
    - "unreviewed_deployment_instruction"
    - "self_permission_expansion"
    - "review_gate_bypass"
    - "trace_suppression"
  required_safeguards:
    - "defensive_context"
    - "abstract_risk_only"
    - "least_privilege"
    - "human_review_required"
    - "trace_required"
    - "no_single_wing_completion"
    - "permission_boundary_required"
    - "external_export_review_required"
    - "residual_risk_recording"
    - "safe_receipt_export_only"

human_review:
  required: true
  review_gate: "before_completion"
  reason: "Multi-wing orchestration affects defensive regulation flow, boundary decisions, trace export, and possible downstream interpretation."
  reviewer_role: "project maintainer or security reviewer"
  review_before:
    - "completion"
    - "deployment"
    - "external_export"
    - "permission_expansion"
    - "external_testing"
    - "high_impact_action"
    - "irreversible_action"
    - "production_change"
    - "policy_change"
    - "publication"


